<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento Anônimo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f5f5f5;
            padding:40px;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        form{
            max-width:500px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input,
        select,
        textarea{
            width:100%;
            padding:12px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#e91e63;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }
    </style>
</head>

<body>

    <h1>Atendimento Anônimo</h1>

    <form id="formulario">

        <input
            type="number"
            id="idade"
            placeholder="Idade"
            required>

        <input
            type="text"
            id="cidade"
            placeholder="Cidade"
            required>

        <select id="tipo" required>
            <option value="">Selecione o tipo de violência</option>
            <option>Psicológica</option>
            <option>Física</option>
            <option>Moral</option>
            <option>Patrimonial</option>
            <option>Sexual</option>
        </select>

        <textarea
            id="descricao"
            rows="5"
            placeholder="Descreva sua situação">
        </textarea>

        <select id="risco" required>
            <option value="">Risco imediato?</option>
            <option>Sim</option>
            <option>Não</option>
        </select>

        <button type="submit">
            Enviar Solicitação
        </button>

    </form>

    <script>

        console.log("Script carregado");

        const formulario =
        document.getElementById("formulario");

        formulario.addEventListener("submit", async function(e){

            e.preventDefault();

            console.log("Botão clicado");

            const dados = {

                idade:
                document.getElementById("idade").value,

                cidade:
                document.getElementById("cidade").value,

                tipo_violencia:
                document.getElementById("tipo").value,

                descricao:
                document.getElementById("descricao").value,

                risco:
                document.getElementById("risco").value
            };

            console.log(dados);

            try{

                const resposta =
                await fetch(
                    "http://localhost:3000/atendimentos",
                    {
                        method:"POST",

                        headers:{
                            "Content-Type":"application/json"
                        },

                        body:JSON.stringify(dados)
                    }
                );

                const resultado =
                await resposta.json();

                console.log(resultado);

                alert("Solicitação enviada com sucesso!");

                formulario.reset();

            }
            catch(erro){

                console.error(erro);

                alert(
                    "Erro ao enviar. Verifique se o servidor está rodando."
                );
            }

        });

    </script>
    <script>

        .getElementById("formulario")

            e.preventDefault();
        
            const dados = {
        
                idade:

                document.getElementById("tipo").value,
        
                descricao:
                document.getElementById("descricao").value,
        
                risco:
                document.getElementById("risco").value
            };
        
            try{
        
                const resposta =
                await fetch(
                    "http://localhost:3000/atendimentos",

                            "Content-Type":"application/json"
                        },
        
                        body:JSON.stringify(dados)
                    }
                );
        
                const resultado =
                await resposta.json();
        
                console.log(resultado);
        
                alert(
                    "Solicitação enviada com sucesso!"
                );
        
                document
                .getElementById("formulario")
                .reset();
        
            }
            catch(erro){
        
                console.error(erro);
        
                alert(
                    "Erro ao enviar solicitação."
                );
            }
        
        });
        
        </script>

</body>

</html>
