<h1>Lei Maria da Penha</h1>

<p>
A Lei nº 11.340/2006 foi criada para proteger mulheres contra a violência doméstica e familiar.
</p>

<h2>Direitos garantidos</h2>

<ul>
<li>Medidas protetivas de urgência;</li>
<li>Afastamento do agressor;</li>
<li>Proteção policial;</li>
<li>Acompanhamento psicológico;</li>
<li>Assistência jurídica.</li>
</ul>
