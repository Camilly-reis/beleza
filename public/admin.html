<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Beleza que Acolhe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <script>
        if (localStorage.getItem("admin_logado") !== "true") {
            window.location.href = "login.html";
        }
    </script>

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">Painel Administrativo</span>
            <button class="btn btn-sm btn-outline-danger" onclick="efetuarLogout()">Sair</button>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 fw-bold text-secondary">Fila de Atendimentos</h2>
            <button class="btn btn-success fw-semibold" data-bs-toggle="modal" data-bs-target="#modalNovoAtendimento">
                + Novo Atendimento Manual
            </button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive p-3">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Idade</th>
                            <th>Cidade</th>
                            <th>Tipo Violência</th>
                            <th>Descrição</th>
                            <th>Risco</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="dados">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalNovoAtendimento">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Cadastrar Atendimento</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formCadastroManual">
                        <label class="fw-bold">Idade</label>
                        <input type="number" id="formIdade" class="form-control mb-3" required>

                        <label class="fw-bold">Cidade</label>
                        <input type="text" id="formCidade" class="form-control mb-3" required>

                        <label class="fw-bold">Tipo de Violência</label>
                        <input type="text" id="formTipo" class="form-control mb-3" required>

                        <label class="fw-bold">Descrição</label>
                        <textarea id="formDescricao" class="form-control mb-3" required></textarea>

                        <label class="fw-bold">Risco</label>
                        <select id="formRisco" class="form-select mb-3" required>
                            <option value="Baixo">Baixo</option>
                            <option value="Médio">Médio</option>
                            <option value="Alto">Alto</option>
                        </select>

                        <button class="btn btn-success w-100">Salvar Registro</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const URL_API = "http://localhost:3000";

        
        function efetuarLogout() {
            localStorage.removeItem("admin_logado");
            window.location.href = "login.html";
        }

        async function carregarAtendimentos() {
            try {
                const resposta = await fetch(`${URL_API}/atendimentos`);
                const dados = await resposta.json();
                let html = "";

                dados.forEach(x => {
                    let corRisco = "bg-info";
                    if (x.risco === "Alto") {
                        corRisco = "bg-danger";
                    } else if (x.risco === "Médio") {
                        corRisco = "bg-warning text-dark";
                    }

                    html += `
                    <tr>
                        <td>#${x.id}</td>
                        <td>${x.idade || "-"} anos</td>
                        <td>${x.cidade}</td>
                        <td>${x.tipo_violencia}</td>
                        <td>${x.descricao || "-"}</td>
                        <td>
                            <span class="badge ${corRisco}">${x.risco}</span>
                        </td>
                        <td>
                            <select class="form-select form-select-sm" onchange="atualizarStatus(${x.id}, this.value)">
                                <option value="Pendente" ${x.status === "Pendente" ? "selected" : ""}>Pendente</option>
                                <option value="Em atendimento" ${x.status === "Em atendimento" ? "selected" : ""}>Em atendimento</option>
                                <option value="Encaminhado" ${x.status === "Encaminhado" ? "selected" : ""}>Encaminhado</option>
                                <option value="Finalizado" ${x.status === "Finalizado" ? "selected" : ""}>Finalizado</option>
                            </select>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deletarRegistro(${x.id})">Excluir</button>
                        </td>
                    </tr>
                    `;
                });

                document.getElementById("dados").innerHTML = html;
            } catch (erro) {
                console.error(erro);
                alert("Erro ao carregar atendimentos. Verifique o servidor.");
            }
        }

        document.getElementById("formCadastroManual").addEventListener("submit", async function (e) {
            e.preventDefault();

            const dados = {
                idade: Number(document.getElementById("formIdade").value),
                cidade: document.getElementById("formCidade").value,
                tipo_violencia: document.getElementById("formTipo").value,
                descricao: document.getElementById("formDescricao").value,
                risco: document.getElementById("formRisco").value,
                status: "Pendente" 
            };

            try {
                const resposta = await fetch(`${URL_API}/atendimentos`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dados)
                });

                const resultado = await resposta.json();

                if (resposta.ok) {
                    alert("Atendimento cadastrado com sucesso!");
                    document.getElementById("formCadastroManual").reset();
                    
                    const modalElement = document.getElementById("modalNovoAtendimento");
                    const modal = bootstrap.Modal.getInstance(modalElement) || new bootstrap.Modal(modalElement);
                    modal.hide();

                    carregarAtendimentos();
                } else {
                    alert(resultado.mensagem || "Erro ao cadastrar atendimento.");
                }
            } catch (erro) {
                console.error(erro);
                alert("Servidor não encontrado.");
            }
        });

        async function atualizarStatus(id, status) {
            try {
                const resposta = await fetch(`${URL_API}/atendimentos/${id}`, {
                    method: "PUT", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status: status })
                });

                const resultado = await resposta.json();

                if (resposta.ok) {
                    alert("Status atualizado!");
                    carregarAtendimentos();
                } else {
                    alert(resultado.mensagem || "Erro ao atualizar status.");
                }
            } catch (erro) {
                console.error(erro);
                alert("Erro ao atualizar status.");
            }
        }

        
        async function deletarRegistro(id) {
            const confirmar = confirm("Deseja excluir este atendimento?");
            if (!confirmar) return;

            try {
                const resposta = await fetch(`${URL_API}/atendimentos/${id}`, {
                    method: "DELETE"
                });

                let resultado = {};
                try { resultado = await resposta.json(); } catch(e) {}

                if (resposta.ok) {
                    alert("Atendimento excluído!");
                    carregarAtendimentos();
                } else {
                    alert(resultado.mensagem || "Erro ao excluir atendimento.");
                }
            } catch (erro) {
                console.error(erro);
                alert("Erro ao excluir atendimento.");
            }
        }

        window.onload = carregarAtendimentos;
    </script>
</body>
</html>
