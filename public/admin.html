<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Beleza que Acolhe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<script>
    if (localStorage.getItem('admin_logado') !== 'true') {
        window.location.href = 'login.html';
    }
</script>

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold">Painel Administrativo</span>
        <button class="btn btn-sm btn-outline-danger" onclick="efetuarLogout()">Sair</button>
    </div>
</nav>

<div class="container mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 fw-bold text-secondary">Fila de Atendimentos</h2>
        <button class="btn btn-success fw-semibold" data-bs-toggle="modal" data-bs-target="#modalNovoAtendimento">+ Novo Atendimento Manual</button>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
        <div class="table-responsive p-3">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-secondary small text-uppercase">
                    <tr>
                        <th>ID</th>
                        <th>Idade</th>
                        <th>Cidade</th>
                        <th>Tipo Violência</th>
                        <th>Descrição</th>
                        <th>Risco</th>
                        <th>Status</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="dados">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalNovoAtendimento" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title fw-bold">Cadastrar Atendimento</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formCadastroManual">
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Idade</label>
                            <input type="number" class="form-control" id="formIdade" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label small fw-bold">Cidade</label>
                            <input type="text" class="form-control" id="formCidade" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Tipo de Violência</label>
                        <input type="text" class="form-control" id="formTipo" required placeholder="Ex: Física, Psicológica">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Descrição</label>
                        <textarea class="form-control" id="formDescricao" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Risco</label>
                        <select class="form-select" id="formRisco" required>
                            <option value="Baixo">Baixo</option>
                            <option value="Médio">Médio</option>
                            <option value="Alto">Alto</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">Salvar Registro</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Mantendo as funções na mesma página para garantir a comunicação direta com o back-end
function efetuarLogout() {
    localStorage.removeItem('admin_logado');
    window.location.href = 'login.html';
}

// READ - Listar registros
function carregarAtendimentos() {
    fetch('/atendimentos')
    .then(r => r.json())
    .then(dados => {
        let html = '';
        dados.forEach(x => {
            const badgeRisco = x.risco === 'Alto' ? 'bg-danger' : x.risco === 'Médio' ? 'bg-warning text-dark' : 'bg-info';
            
            html += `
                <tr>
                    <td class="fw-bold">#${x.id}</td>
                    <td>${x.idade || 'N/A'} anos</td>
                    <td>${x.cidade}</td>
                    <td><span class="badge bg-light text-dark border">${x.tipo_violencia || 'Geral'}</span></td>
                    <td>${x.descricao || 'Sem descrição'}</td>
                    <td><span class="badge ${badgeRisco}">${x.risco || 'Baixo'}</span></td>
                    <td>
                        <select class="form-select form-select-sm fw-semibold" onchange="atualizarStatus(${x.id}, this.value)">
                            <option value="Pendente" ${x.status === 'Pendente' ? 'selected' : ''}>Pendente</option>
                            <option value="Em atendimento" ${x.status === 'Em atendimento' ? 'selected' : ''}>Em atendimento</option>
                            <option value="Encaminhado" ${x.status === 'Encaminhado' ? 'selected' : ''}>Encaminhado</option>
                            <option value="Finalizado" ${x.status === 'Finalizado' ? 'selected' : ''}>Finalizado</option>
                        </select>
                    </td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-danger" onclick="deletarRegistro(${x.id})">Excluir</button>
                    </td>
                </tr>`;
        });
        document.getElementById('dados').innerHTML = html;
    });
}

// CREATE - Cadastro manual
document.getElementById('formCadastroManual').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const novoAtendimento = {
        idade: parseInt(document.getElementById('formIdade').value),
        cidade: document.getElementById('formCidade').value,
        tipo_violencia: document.getElementById('formTipo').value,
        descricao: document.getElementById('formDescricao').value,
        risco: document.getElementById('formRisco').value,
        status: "Pendente"
    };

    fetch('/atendimentos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(novoAtendimento)
    })
    .then(res => {
        if (res.ok) {
            bootstrap.Modal.getInstance(document.getElementById('modalNovoAtendimento')).hide();
            document.getElementById('formCadastroManual').reset();
            carregarAtendimentos();
        }
    });
});

// UPDATE - Enviar novo status
function atualizarStatus(id, novoStatus) {
    fetch(`/atendimentos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: novoStatus })
    })
    .then(() => carregarAtendimentos());
}

// DELETE - Apagar do banco
function deletarRegistro(id) {
    if (confirm(`Tem certeza que deseja excluir o atendimento #${id}?`)) {
        fetch(`/atendimentos/${id}`, { method: 'DELETE' })
        .then(() => carregarAtendimentos());
    }
}

window.onload = carregarAtendimentos;
</script>
</body>
</html>
