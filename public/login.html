<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Beleza que Acolhe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: none; }
    </style>
</head>
<body>

<div class="card login-card bg-white rounded-4">
    <h3 class="text-center fw-bold mb-2">Beleza que Acolhe</h3>
    <p class="text-muted text-center small mb-4">Painel Administrativo</p>
    
    <div id="erroLogin" class="alert alert-danger d-none py-2 text-center small">
        Usuário ou senha incorretos!
    </div>
    
    <form id="formLogin">
        <div class="mb-3">
            <label class="form-label small fw-bold">USUÁRIO</label>
            <input type="text" class="form-control" id="usuario" required autocomplete="off">
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">SENHA</label>
            <input type="password" class="form-control" id="senha" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Entrar</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
